<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Créer un compte | Moriah Digital</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <a href="index.html" class="back-link">← Retour à l’accueil</a>
      <h1>Créer un compte</h1>
      <p>Inscrivez-vous avec votre e-mail pour accéder à votre espace client.</p>

      <form class="form-grid" id="registerForm">
        <div class="form-group">
          <label for="name">Nom complet</label>
          <input type="text" id="name" required>
        </div>

        <div class="form-group">
          <label for="phone">Téléphone</label>
          <input type="text" id="phone" required>
        </div>

        <div class="form-group">
          <label for="email">Adresse e-mail</label>
          <input type="email" id="email" required>
        </div>

        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" required>
        </div>

        <button class="btn" type="submit">Créer mon compte</button>
      </form>

      <p id="registerMessage" class="status-message"></p>

      <hr style="margin:24px 0; border:none; border-top:1px solid #e2e8e4;">

      <h1>Connexion</h1>
      <p>Connectez-vous à votre compte existant.</p>

      <form class="form-grid" id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Adresse e-mail</label>
          <input type="email" id="loginEmail" required>
        </div>

        <div class="form-group">
          <label for="loginPassword">Mot de passe</label>
          <input type="password" id="loginPassword" required>
        </div>

        <button class="btn secondary" type="submit">Se connecter</button>
      </form>

      <p id="loginMessage" class="status-message"></p>
    </div>
  </div>

  <script type="module" src="auth.js"></script>
</body>
</html>
