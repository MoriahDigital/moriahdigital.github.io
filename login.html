<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion - Moriah Digital</title>
  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      font-family:Arial,sans-serif;
      background:linear-gradient(180deg,#edf4ef 0%,#f8f8f8 100%);
      color:#1d1d1d;
      min-height:100vh;
    }

    .container{
      max-width:500px;
      margin:40px auto;
      padding:20px;
    }

    .card{
      background:#fff;
      border-radius:24px;
      padding:28px 22px;
      box-shadow:0 18px 35px rgba(0,0,0,0.08);
      border:1px solid #e7eeea;
    }

    .logo{
      text-align:center;
      margin-bottom:18px;
    }

    .logo img{
      width:95px;
      border-radius:16px;
      background:#fff;
      padding:6px;
      box-shadow:0 10px 20px rgba(0,0,0,0.12);
    }

    h1{
      text-align:center;
      color:#0f6f2e;
      margin-bottom:10px;
      font-size:2rem;
    }

    .subtitle{
      text-align:center;
      color:#555;
      margin-bottom:24px;
      line-height:1.7;
    }

    label{
      display:block;
      margin:14px 0 8px;
      color:#145c29;
      font-weight:700;
      font-size:1.1rem;
    }

    input{
      width:100%;
      padding:16px;
      border:1px solid #cfd8d3;
      border-radius:18px;
      font-size:1.05rem;
      outline:none;
    }

    input:focus{
      border-color:#129a43;
      box-shadow:0 0 0 3px rgba(18,154,67,0.12);
    }

    button{
      width:100%;
      margin-top:22px;
      padding:16px;
      border:none;
      border-radius:18px;
      background:#148c3a;
      color:#fff;
      font-size:1.2rem;
      font-weight:700;
      cursor:pointer;
    }

    button:hover{
      background:#0f7631;
    }

    .message{
      margin-top:18px;
      text-align:center;
      font-weight:700;
      min-height:28px;
      line-height:1.5;
    }

    .success{
      color:#148c3a;
    }

    .error{
      color:#b3261e;
    }

    .bottom-text{
      margin-top:24px;
      text-align:center;
      color:#666;
      line-height:1.8;
    }

    .back-link{
      display:inline-block;
      margin-top:18px;
      text-align:center;
      width:100%;
      color:#0f6f2e;
      font-weight:700;
      text-decoration:none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">
        <img src="logo.png" alt="Logo Moriah Digital">
      </div>

      <h1>Connexion</h1>
      <p class="subtitle">
        Connectez-vous à votre compte existant pour accéder à votre espace client.
      </p>

      <form id="loginForm">
        <label for="email">Adresse e-mail</label>
        <input type="email" id="email" placeholder="Entrez votre adresse e-mail" required>

        <label for="password">Mot de passe</label>
        <input type="password" id="password" placeholder="Entrez votre mot de passe" required>

        <button type="submit" id="loginBtn">Se connecter</button>
      </form>

      <div id="message" class="message"></div>

      <p class="bottom-text">
        En vous connectant, vous pouvez retrouver plus facilement les services,
        produits et informations de Moriah Digital.
      </p>

      <a href="index.html" class="back-link">← Retour au site</a>
    </div>
  </div>

  <script type="module">
    import { auth } from "./firebase-config.js";
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const form = document.getElementById("loginForm");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const message = document.getElementById("message");
    const loginBtn = document.getElementById("loginBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      message.textContent = "";
      message.className = "message";
      loginBtn.disabled = true;
      loginBtn.textContent = "Connexion...";

      try {
        await signInWithEmailAndPassword(auth, email, password);
        message.textContent = "Connexion réussie. Redirection...";
        message.classList.add("success");

        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 1000);
      } catch (error) {
        let errorText = "Impossible de se connecter pour le moment.";

        if (error.code === "auth/invalid-credential") {
          errorText = "E-mail ou mot de passe incorrect.";
        } else if (error.code === "auth/user-not-found")
