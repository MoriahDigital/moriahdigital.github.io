<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inscription envoyée | Moriah Digital</title>
  <meta name="description" content="Votre inscription a bien été envoyée à Moriah Digital.">
  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      font-family:Arial, sans-serif;
      background:linear-gradient(180deg,#edf4ef 0%,#f8f8f8 100%);
      color:#1d1d1d;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      padding:20px;
    }

    .card{
      max-width:700px;
      width:100%;
      background:white;
      border-radius:24px;
      padding:32px 24px;
      text-align:center;
      box-shadow:0 18px 35px rgba(0,0,0,0.08);
      border:1px solid #edf1ef;
    }

    .icon{
      font-size:3rem;
      margin-bottom:12px;
    }

    h1{
      color:#0f6f2e;
      margin-bottom:14px;
      font-size:2rem;
    }

    p{
      color:#444;
      line-height:1.8;
      margin-bottom:18px;
      font-size:1rem;
    }

    .btn-row{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:12px;
      margin-top:10px;
    }

    .btn{
      display:inline-block;
      text-decoration:none;
      padding:14px 18px;
      border-radius:12px;
      font-weight:bold;
      transition:0.25s ease;
    }

    .btn-primary{
      background:linear-gradient(135deg,#28c76f,#1fb65e);
      color:white;
    }

    .btn-secondary{
      background:linear-gradient(135deg,#0f6f2e,#17873a);
      color:white;
    }

    .btn:hover{
      transform:translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Inscription envoyée</h1>
    <p>
      Votre demande a bien été envoyée à Moriah Digital.
      Nous vous contacterons dès que possible.
    </p>

    <div class="btn-row">
      <a class="btn btn-primary" href="index.html">Retour à l’accueil</a>
      <a class="btn btn-secondary" href="https://wa.me/224625262696?text=Bonjour%20Moriah%20Digital,%20je%20viens%20d%27envoyer%20mon%20inscription." target="_blank">Écrire sur WhatsApp</a>
    </div>
  </div>
</body>
</html>
